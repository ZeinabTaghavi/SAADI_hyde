dataset:
  name: qasper
  hf_dataset: allenai/qasper
  config_name: default
  split: test
  subset_manifest: qasper_hipporag_subset.json

chunking:
  method: saadi_sentence_aware_words
  chunk_size: 500
  chunk_overlap: 0

retrieval:
  scope: per_document
  top_ks: [5, 10]
  encoder:
    model_name: facebook/contriever
    pooling: mean
    normalize_embeddings: true
    batch_size: 128
    max_length: 512

hyde:
  prompt_task: web search
  include_original_query: true
  aggregation: arithmetic_mean
  generator:
    backend: transformers
    model_name: Qwen/Qwen3-30B-A3B-Instruct-2507
    n: 8
    max_new_tokens: 512
    temperature: 0.7
    top_p: 0.8
    stop:
      - "\n\n\n"
    device_map: auto
    torch_dtype: auto
    trust_remote_code: true
    attempts_per_hypothesis: 3

seed: null
